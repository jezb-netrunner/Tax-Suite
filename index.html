<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Present Value — Philippine Tax Suite</title>
<meta name="description" content="Tax calendar, regime calculator, BIR form reference, and tools for self-employed Filipino professionals.">
<meta name="theme-color" content="#2a4d62">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%232a4d62'/%3E%3Ctext x='16' y='22' font-size='16' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'%3E%E2%82%B1%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
:root {
  --bg: #f5f8fb;
  --sf: #ffffff;
  --line: #e3eaf1;
  --line2: #eef2f7;
  --ink: #27384a;
  --mut: #76869a;
  --dim: #9aabbc;
  --brand: #2a4d62;
  --brand2: #1f3d50;
  --acc: #3f7cae;
  --accSoft: #e8f1fa;
  --accInk: #2e5f88;
  --accDot: #4f88b8;
  --good: #2f8a5b;
  --goodSoft: #e3f3ea;
  --warn: #c2843c;
  --warnSoft: #f6edd9;
  --shadow-sm: 0 1px 2px rgba(16,42,67,.05);
  --shadow-md: 0 8px 22px rgba(16,42,67,.08);
}
body {
  background: var(--bg);
  font-family: 'Schibsted Grotesk', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  color: var(--ink);
  font-size: 14px;
}
::selection { background: #d4e6f6; }
button, input { font-family: inherit; }
a { color: inherit; }
:focus-visible { outline: 2px solid var(--acc); outline-offset: 2px; border-radius: 6px; }
.mono { font-family: 'IBM Plex Mono', monospace; }

/* layout */
.wrap { max-width: 1080px; margin: 0 auto; padding-left: 28px; padding-right: 28px; }
.page { animation: rise .28s ease both; }
@keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* header */
.hdr {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 14px 28px;
  background: rgba(255,255,255,.86); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
}
.hdr-left { display: flex; align-items: center; gap: 16px; flex: 1 1 auto; min-width: 0; }
.brand { display: flex; align-items: center; gap: 11px; flex-shrink: 0; }
.brand-mark {
  width: 30px; height: 30px; border-radius: 50%; background: var(--brand); color: #fff;
  display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px;
}
.brand-name { font-weight: 700; font-size: 16.5px; letter-spacing: -.02em; white-space: nowrap; }
.nav { display: flex; gap: 2px; flex: 0 1 auto; overflow-x: auto; min-width: 0; scrollbar-width: none; }
.nav::-webkit-scrollbar { display: none; }
.nav button {
  padding: 8px 14px; border: none; border-radius: 9px; font-size: 13.5px; cursor: pointer;
  white-space: nowrap; transition: background .15s, color .15s;
  background: transparent; color: var(--mut); font-weight: 500;
}
.nav button:hover { background: #f0f5fa; color: var(--ink); }
.nav button.active { background: var(--accSoft); color: var(--accInk); font-weight: 600; }
.avatar {
  width: 32px; height: 32px; border-radius: 50%; background: var(--accSoft); color: var(--accInk);
  display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0;
}

/* segmented controls */
.seg {
  display: flex; gap: 3px; background: #eaf0f6; border: 1px solid var(--line);
  border-radius: 11px; padding: 3px; overflow-x: auto; max-width: 100%; scrollbar-width: none;
}
.seg::-webkit-scrollbar { display: none; }
.seg button {
  padding: 7px 13px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer;
  white-space: nowrap; transition: background .15s, color .15s, box-shadow .15s;
  background: transparent; color: var(--mut); font-weight: 500;
}
.seg button:hover { color: var(--ink); }
.seg button.active { background: #fff; color: var(--brand); font-weight: 600; box-shadow: 0 1px 2px rgba(20,40,60,.12); }

/* cards & lists */
.card { background: var(--sf); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow-sm); }
.card.pad { padding: 22px; }
.card.tight { padding: 18px; }
.click { cursor: pointer; transition: border-color .15s, box-shadow .2s, transform .2s; }
.click:hover { border-color: #cfdeeb; box-shadow: var(--shadow-md); transform: translateY(-1px); }
.list-card { border: 1px solid var(--line); border-radius: 13px; background: var(--sf); overflow: hidden; box-shadow: var(--shadow-sm); }
.frow { display: flex; align-items: center; gap: 16px; padding: 15px 18px; }
.frow + .frow { border-top: 1px solid var(--line2); }

/* hero */
.hero {
  background: linear-gradient(135deg, var(--brand), var(--brand2));
  border-radius: 16px; padding: 28px; color: #fff;
  display: flex; flex-wrap: wrap; justify-content: space-between; gap: 24px;
  box-shadow: 0 14px 34px rgba(24,52,74,.18);
}
.hero-side { text-align: right; flex-shrink: 0; border-left: 1px solid rgba(255,255,255,.14); padding-left: 24px; }
.hero-days { font-family: 'IBM Plex Mono', monospace; font-size: 52px; font-weight: 600; line-height: 1; letter-spacing: -.02em; }
.eyebrow {
  font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; font-weight: 500;
  letter-spacing: .13em; text-transform: uppercase; color: #a9cde6;
}
.btn-light {
  margin-top: 20px; padding: 11px 18px; border-radius: 10px; border: none;
  background: #fff; color: var(--brand); font-weight: 600; font-size: 13.5px; cursor: pointer;
  transition: transform .15s, box-shadow .15s;
}
.btn-light:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,0,0,.18); }
.btn-light:active { transform: none; }

/* inputs */
.lbl { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--mut); }
.input-w {
  display: flex; align-items: center; gap: 8px; margin-top: 8px;
  border: 1.5px solid var(--line); border-radius: 10px; padding: 9px 13px; background: #fbfdff;
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.input-w:focus-within { border-color: var(--acc); box-shadow: 0 0 0 3px var(--accSoft); background: #fff; }
.input-w input {
  border: none; outline: none; background: transparent;
  font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: var(--ink);
  width: 100%; min-width: 0;
}
.input-w .pre { font-family: 'IBM Plex Mono', monospace; font-size: 15px; color: var(--mut); }
.input-w.lg input, .input-w.lg .pre { font-size: 18px; }
.search-w {
  display: flex; align-items: center; gap: 8px; border: 1.5px solid var(--line); border-radius: 10px;
  padding: 9px 13px; background: var(--sf); min-width: 240px; transition: border-color .15s, box-shadow .15s;
}
.search-w:focus-within { border-color: var(--acc); box-shadow: 0 0 0 3px var(--accSoft); }
.search-w input { border: none; outline: none; background: transparent; font-size: 14px; color: var(--ink); width: 100%; min-width: 0; }

/* tags & chips */
.tag { font-size: 11.5px; font-weight: 600; padding: 5px 11px; border-radius: 100px; background: #eef3f8; color: var(--mut); white-space: nowrap; flex-shrink: 0; }
.chip { padding: 5px 11px; border-radius: 7px; background: #eef3f8; font-size: 12px; font-weight: 600; color: var(--mut); }
.formcode {
  font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; font-weight: 600;
  color: var(--accInk); background: var(--accSoft); padding: 6px 10px; border-radius: 8px;
  white-space: nowrap; flex-shrink: 0;
}
.boxcode {
  font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; font-weight: 600;
  color: var(--accInk); background: var(--accSoft); padding: 3px 8px; border-radius: 6px;
  white-space: nowrap; flex-shrink: 0; min-width: 56px; text-align: center;
}

/* table */
.tbl { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.tbl th {
  text-align: left; padding: 11px 16px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em; color: var(--mut); background: #f3f7fb;
}
.tbl th.r, .tbl td.r { text-align: right; }
.tbl td { padding: 12px 16px; }
.tbl tbody tr { border-top: 1px solid var(--line2); transition: background .12s; }
.tbl tbody tr:hover { background: #f7fafd; }

/* headings */
.pg-h1 { font-size: 24px; font-weight: 800; letter-spacing: -.025em; }
.pg-sub { font-size: 14px; color: var(--mut); margin-top: 4px; }
.sec-h { font-size: 15px; font-weight: 700; letter-spacing: -.01em; }

/* misc */
.linkbtn { border: none; background: transparent; font-size: 12.5px; font-weight: 600; color: var(--accInk); cursor: pointer; padding: 0; }
.linkbtn:hover { text-decoration: underline; }
.mini-warn { margin-top: 12px; font-size: 12.5px; color: #7a5a1f; background: var(--warnSoft); border-radius: 9px; padding: 10px 13px; line-height: 1.5; }
.acc-body { animation: rise .2s ease both; }
.ftr { border-top: 1px solid var(--line); padding: 24px 28px 34px; }
.ftr p { max-width: 1080px; margin: 0 auto; font-size: 12.5px; color: var(--dim); line-height: 1.6; }

@media (max-width: 720px) {
  .wrap { padding-left: 18px; padding-right: 18px; }
  .hdr { padding: 12px 18px; }
  .hero { padding: 22px; }
  .hero-side { border-left: none; padding-left: 0; text-align: left; border-top: 1px solid rgba(255,255,255,.14); padding-top: 16px; width: 100%; }
  .hero-days { font-size: 40px; }
  .pg-h1 { font-size: 21px; }
}
@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}
</style>
</head>

<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>

<script type="text/babel">
const { useState, useEffect } = React;

// ── constants ──────────────────────────────────────────────────────────────
// Live clock, normalized to local midnight. Dated obligations below follow the
// TY 2026 BIR schedule (weekend deadlines moved to the next business day).
const NOW = new Date();
const TODAY = new Date(NOW.getFullYear(), NOW.getMonth(), NOW.getDate());
const VAT_THRESHOLD = 3000000;

const TYPES = {
  se:   { name: 'Self-Employed',  vat: 'Non-VAT',        regimes: [{key:'8pct',label:'8% income tax'},{key:'grad',label:'Graduated + 3%'}] },
  mi:   { name: 'Mixed Income',   vat: 'Non-VAT',        regimes: [{key:'8pct',label:'8% on business'},{key:'grad',label:'Graduated + 3%'}] },
  corp: { name: 'Corporation',    vat: 'VAT-registered', regimes: [{key:'reg',label:'Regular CIT'}] },
  emp:  { name: 'Employee',       vat: '—',              regimes: [{key:'comp',label:'Compensation only'}] },

const OB = [
  {id:'se_q2',   t:'File & pay Q2 income tax',           d:'Your quarterly income tax on earnings above the ₱250,000 yearly allowance.',  form:'1701Q',  freq:'Quarterly', cat:'income',  kind:'dated',   date:'2026-08-17', shift:'moved from Aug 15 (Sat)', amt:18400, types:['se','mi'], reg:['8pct','grad']},
  {id:'se_q3',   t:'File & pay Q3 income tax',           d:'Third-quarter income tax installment.',                                        form:'1701Q',  freq:'Quarterly', cat:'income',  kind:'dated',   date:'2026-11-16', shift:'moved from Nov 15 (Sun)', amt:null,  types:['se','mi'], reg:['8pct','grad']},
  {id:'se_ann',  t:'File annual income tax return',       d:'Your year-end return reconciling all four quarters.',                          form:'1701A',  freq:'Annual',    cat:'income',  kind:'dated',   date:'2027-04-15', shift:null,                      amt:null,  types:['se','mi'], reg:['8pct','grad']},
  {id:'se_pt2',  t:'File & pay percentage tax (Q2)',      d:'3% of your gross receipts for the quarter — graduated filers only.',           form:'2551Q',  freq:'Quarterly', cat:'biz',     kind:'dated',   date:'2026-07-27', shift:'moved from Jul 25 (Sat)', amt:null,  types:['se','mi'], reg:['grad']},
  {id:'se_pt3',  t:'File & pay percentage tax (Q3)',      d:'3% of your gross receipts for the quarter.',                                   form:'2551Q',  freq:'Quarterly', cat:'biz',     kind:'dated',   date:'2026-10-26', shift:'moved from Oct 25 (Sun)', amt:null,  types:['se','mi'], reg:['grad']},
  {id:'contrib', t:'Pay SSS, PhilHealth & Pag-IBIG',      d:'Due end of month for the prior month. As a freelancer you cover both shares.', form:'Agency', freq:'Monthly',   cat:'contrib', kind:'monthly', date:null,         shift:null,                      amt:2640,  types:['se','mi'], reg:'all'},
  {id:'inv',     t:'Issue BIR-registered invoices',       d:'For every sale or receipt — no minimum amount.',                               form:null,     freq:'Ongoing',   cat:'admin',   kind:'ongoing', date:null,         shift:null,                      amt:null,  types:['se','mi'], reg:'all'},
  {id:'books',   t:'Keep your books of accounts updated', d:'Record income and expenses as they happen.',                                   form:null,     freq:'Ongoing',   cat:'admin',   kind:'ongoing', date:null,         shift:null,                      amt:null,  types:['se','mi'], reg:'all'},
  {id:'c_vat',   t:'File & pay quarterly VAT',            d:'Output VAT less your input VAT for the quarter.',                              form:'2550Q',  freq:'Quarterly', cat:'biz',     kind:'dated',   date:'2026-07-27', shift:'moved from Jul 25 (Sat)', amt:null,  types:['corp'],    reg:'all'},
  {id:'c_q2',    t:'File quarterly income tax',           d:'Second-quarter corporate income tax — due 60 days after the quarter closes.',  form:'1702Q',  freq:'Quarterly', cat:'income',  kind:'dated',   date:'2026-08-31', shift:'moved from Aug 29 (Sat)', amt:null,  types:['corp'],    reg:'all'},
  {id:'c_comp',  t:'Remit withholding on compensation',   d:'Tax withheld from your employees\' salaries — due the 10th of the following month.', form:'1601-C', freq:'Monthly', cat:'wh',  kind:'monthly', dueDay:10,         shift:null,                      amt:null,  types:['corp'],    reg:'all'},
  {id:'c_exp',   t:'Remit expanded withholding',          d:'Creditable tax withheld from your suppliers — due the 10th of the following month.',  form:'0619-E', freq:'Monthly', cat:'wh',  kind:'monthly', dueDay:10,         shift:null,                      amt:null,  types:['corp'],    reg:'all'},
  {id:'c_ann',   t:'File annual income tax return',       d:'Year-end corporate return.',                                                   form:'1702-RT',freq:'Annual',    cat:'income',  kind:'dated',   date:'2027-04-15', shift:null,                      amt:null,  types:['corp'],    reg:'all'},
  {id:'c_books', t:'Keep books & issue invoices',         d:'Maintain registered books and issue invoices for all sales.',                  form:null,     freq:'Ongoing',   cat:'admin',   kind:'ongoing', date:null,         shift:null,                      amt:null,  types:['corp'],    reg:'all'},
  {id:'e_2316',  t:'Get BIR Form 2316 from your employer',d:'Your employer files for you and hands you a stamped copy by Jan 31.',          form:'2316',   freq:'Annual',    cat:'income',  kind:'dated',   date:'2027-01-31', shift:null,                      amt:null,  types:['emp'],     reg:'all'},
  {id:'e_sub',   t:'You likely don\'t need to file',      d:'With a single employer, substituted filing covers your return.',               form:null,     freq:'Ongoing',   cat:'admin',   kind:'ongoing', date:null,         shift:null,                      amt:null,  types:['emp'],     reg:'all'},
  {id:'e_upd',   t:'Keep your BIR records current',       d:'Use Form 1905 if you change employer, RDO, or civil status.',                  form:'1905',   freq:'As needed', cat:'admin',   kind:'ongoing', date:null,         shift:null,                      amt:null,  types:['emp'],     reg:'all'},
];

// TY 2026 quarterly filing schedule (weekend-adjusted) used by the progress rail.
const SCHED = {
  se:   [['Q1','May 15','2026-05-15'],['Q2','Aug 17','2026-08-17'],['Q3','Nov 16','2026-11-16'],['Annual','Apr 2027','2027-04-15']],
  corp: [['Q1','Jun 1','2026-06-01'],['Q2','Aug 31','2026-08-31'],['Q3','Nov 30','2026-11-30'],['Annual','Apr 2027','2027-04-15']],
};

const CATLABEL = { income:'Income tax', biz:'Business tax', wh:'Withholding', contrib:'Contributions', admin:'Admin' };

const FORMS_DATA = [
  {code:'1701Q', name:'Quarterly Income Tax Return', cat:'income', who:'Self-employed, professionals & mixed-income earners', when:'May 15 · Aug 15 · Nov 15', summary:'Your income tax, paid three times a year and cumulatively. Each quarter you total your income since January, compute the tax, and subtract what you already paid in earlier quarters.', lines:[{box:'Part II',desc:'Choose 8% or graduated — it must match what you elected for the year.'},{box:'Sch 1',desc:'Cumulative gross sales / receipts for the quarter.'},{box:'Item 47',desc:'Tax still due after prior payments and creditable withholding.'}]},
  {code:'1701A', name:'Annual Income Tax Return (8% / OSD)', cat:'income', who:'Pure business or professional income, on 8% or OSD', when:'April 15', summary:'The simplified annual return for people whose only income is from business or practice of profession, using the 8% rate or the 40% OSD. One page of math reconciling your four quarters.', lines:[{box:'Item 16',desc:'Total gross sales / receipts for the year.'},{box:'Item 19',desc:'Taxable income after the ₱250k allowance (8%) or OSD.'},{box:'Item 26',desc:'Tax payable after creditable withholding (your 2307s).'}]},
  {code:'1701',  name:'Annual Income Tax Return (itemized / mixed)', cat:'income', who:'Itemized-deduction filers & mixed-income earners', when:'April 15', summary:'The full annual return — used if you itemize your actual expenses or also earn compensation. Longer, because it carries detailed schedules of income and deductions.', lines:[{box:'Sch 3',desc:'Itemized deductions — must match your books and receipts.'},{box:'Part VI',desc:'Computation of tax due across all your income types.'}]},
  {code:'1702Q', name:'Quarterly Income Tax Return (Corporations)', cat:'income', who:'Corporations & taxable partnerships', when:'60 days after quarter-end', summary:'The corporate counterpart of the 1701Q — filed within 60 days of each of the first three quarters, computing cumulative income tax at the corporate rate less prior payments and credits.', lines:[{box:'Part II',desc:'Cumulative taxable income for the year so far.'},{box:'Item',desc:'Tax due at 25% (or 20% for qualifying small corporations under CREATE).'}]},
  {code:'1702-RT', name:'Annual Income Tax Return (Corporation — regular rate)', cat:'income', who:'Corporations on the regular income tax rate', when:'April 15 (calendar year)', summary:'The year-end corporate return, due the 15th day of the fourth month after the taxable year closes. Regular corporate income tax is 25% — 20% for small corporations with taxable income up to ₱5M and assets up to ₱100M, under CREATE.', lines:[{box:'Sch',desc:'Reconciles the three quarterly filings against the full-year figure.'},{box:'MCIT',desc:'Compare against the 2% minimum corporate income tax where applicable.'}]},
  {code:'2551Q', name:'Quarterly Percentage Tax', cat:'business', who:'Non-VAT taxpayers on graduated rates', when:'Apr 25 · Jul 25 · Oct 25 · Jan 25', summary:'A 3% tax on your gross receipts, filed quarterly. You only file this on graduated rates — electing the 8% income tax exempts you from it entirely.', lines:[{box:'Sch 1',desc:'Taxable gross receipts for the quarter.'},{box:'Item 17',desc:'Tax due at 3% (ATC PT010).'}]},
  {code:'2307',  name:'Certificate of Creditable Tax Withheld', cat:'withholding', who:'You receive this from clients who withhold', when:'Given with payment / per quarter', summary:'When a client withholds tax from your fee (often 5% or 10%) they hand you a 2307. It is cash you have already paid the BIR — attach it to your returns to reduce what you owe.', lines:[{box:'Part II',desc:'Income payments and the tax withheld.'},{box:'Use',desc:'Claim the amount as a creditable tax on your 1701Q / 1701A.'}]},
  {code:'0605',  name:'Payment Form', cat:'business', who:'Anyone making a BIR payment', when:'As needed', summary:'The generic form for paying the BIR when no specific return applies — registration-related items, penalties, or deficiency taxes.', lines:[{box:'Tax type',desc:'Select the matching tax type and period.'}]},
  {code:'2316',  name:'Certificate of Compensation / Tax Withheld', cat:'withholding', who:'Employees receive this from their employer', when:'By January 31', summary:'Your employer\'s summary of your salary and the tax they withheld for the year. With a single employer, this doubles as your filed return through substituted filing.', lines:[{box:'Part IV-A',desc:'Total compensation and tax withheld.'}]},
  {code:'1901',  name:'Registration — Self-Employed', cat:'registration', who:'New freelancers & professionals', when:'Before starting business', summary:'How you register as self-employed, receive your Certificate of Registration (2303), and choose your tax type. The old ₱500 annual registration fee was removed in 2024 under EOPT.', lines:[{box:'Result',desc:'You receive Form 2303 and authority to issue invoices.'}]},
  {code:'1905',  name:'Update of Registration', cat:'registration', who:'Anyone changing their BIR details', when:'When details change', summary:'Used to update registered information — change of RDO, civil status, or line of business, or to close a registration.', lines:[{box:'Use',desc:'Tick the change you need and attach supporting documents.'}]},
  {code:'1601-C', name:'Monthly Remittance — Withholding on Compensation', cat:'withholding', who:'Employers withholding from salaries', when:'10th of the following month', summary:'Employers remit the income tax withheld from employees\' pay every month using this return, then reconcile the year with the annual 1604-C and each employee\'s 2316.', lines:[{box:'Item',desc:'Total compensation paid and total tax withheld for the month.'}]},
  {code:'0619-E',name:'Monthly Remittance — Expanded Withholding', cat:'withholding', who:'Businesses that withhold from suppliers', when:'10th of the following month', summary:'If you pay suppliers or contractors and are required to withhold, this remits that creditable tax monthly, with 1601-EQ filed quarterly.', lines:[{box:'Item',desc:'Total expanded withholding for the month.'}]},
  {code:'2550Q', name:'Quarterly VAT Return', cat:'business', who:'VAT-registered taxpayers (over ₱3M)', when:'25 days after quarter-end', summary:'Once your sales pass ₱3M you register for VAT and file this quarterly — output VAT on sales, less input VAT on purchases.', lines:[{box:'Output',desc:'12% VAT on your taxable sales.'},{box:'Input',desc:'12% VAT on purchases, credited against output.'}]},
];

const POSTS = [
  {id:'8-vs-grad', cat:'Guides', title:'8% or graduated? A freelancer\'s five-minute decision', excerpt:'The single choice you make at registration quietly shapes every deadline and every peso you owe. Here\'s how to get it right.', read:'6 min read', date:'June 2026', feature:true, body:[
    {kind:'p', text:'When you register as self-employed, the BIR asks how your income should be taxed. There are two roads, and the one you pick quietly shapes every deadline and every peso you owe for the rest of the year.'},
    {kind:'h', text:'The 8% road'},
    {kind:'p', text:'You pay a flat 8% on your gross receipts above ₱250,000 — and nothing else. No percentage tax, no itemizing, no separate 2551Q. For most freelancers with low overhead, it is both the simplest and the cheapest option.'},
    {kind:'h', text:'The graduated road'},
    {kind:'p', text:'You pay the regular income-tax brackets on your profit — after either the 40% OSD or your actual expenses — plus a separate 3% percentage tax on gross. It wins when your expenses are high enough to pull your taxable income well down.'},

// ── helpers ────────────────────────────────────────────────────────────────
function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function daysUntil(d) { return Math.round((d - TODAY) / 86400000); }
function fmtDate(d) { return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function mShort(d) { return d.toLocaleDateString('en-US',{month:'short'}).toUpperCase(); }
function money(n) { return '₱' + Math.round(n).toLocaleString('en-US'); }
function endOfMonth() { return new Date(TODAY.getFullYear(), TODAY.getMonth()+1, 0); }
function nextDueOn(day) {
  const d = new Date(TODAY.getFullYear(), TODAY.getMonth(), day);
  return d >= TODAY ? d : new Date(TODAY.getFullYear(), TODAY.getMonth()+1, day);
}

// Graduated income tax on individuals — Sec 24(A), TRAIN rates effective 2023 onward.
function gradTax(n) {
  if (n <= 250000) return 0;
  if (n <= 400000) return (n-250000)*0.15;
  if (n <= 800000) return 22500+(n-400000)*0.20;
  if (n <= 2000000) return 102500+(n-800000)*0.25;
  if (n <= 8000000) return 402500+(n-2000000)*0.30;
  return 2202500+(n-8000000)*0.35;
}
// Monthly withholding on compensation — revised table effective 2023 (RR 11-2018 as amended).
function monthlyWH(x) {
  if (x <= 20833) return 0;
  if (x <= 33332) return (x-20833)*0.15;
  if (x <= 66666) return 1875+(x-33333)*0.20;
  if (x <= 166666) return 8541.80+(x-66667)*0.25;
  if (x <= 666666) return 33541.80+(x-166667)*0.30;
  return 183541.80+(x-666667)*0.35;
}
// Compromise penalty for late filing/payment — RMO 7-2015 schedule.
function compromise(a) {
  if (a <= 5000) return 1000;
  if (a <= 10000) return 3000;
  if (a <= 20000) return 5000;
  if (a <= 50000) return 10000;
  if (a <= 100000) return 15000;
  if (a <= 500000) return 20000;
  if (a <= 1000000) return 30000;
  return 50000;
}

function effDate(o) {
  if (o.kind === 'dated') return parseDate(o.date);
  if (o.kind === 'monthly') return o.dueDay ? nextDueOn(o.dueDay) : endOfMonth();
  return null;
}

function feedItem(o) {
  const ed = effDate(o);
  const it = { isDated: o.kind!=='ongoing', isOngoing: o.kind==='ongoing', title: o.t, desc: o.d };
  if (ed) { it.dateTop = String(ed.getDate()); it.dateBot = mShort(ed); }
  if (o.amt != null) { it.hasAmount=true; it.amount=(o.kind==='monthly'?'≈ ':'')+money(o.amt); it.hasTag=false; }
  else { it.hasAmount=false; it.hasTag=true; it.tag=o.freq; }
  return it;
}

}

    setState(s => ({ ...s, type: t, regime: TYPES[t].regimes[0].key }));
  }

  const applicable = OB.filter(o =>
    o.types.includes(type) && (o.reg === 'all' || o.reg.includes(regime))
  );
  const today = TODAY, eom = endOfMonth();

  const heroPool = applicable.filter(o => o.kind==='dated' && (o.cat==='income'||o.cat==='biz') && parseDate(o.date)>=today)
    .sort((a,b) => parseDate(a.date) - parseDate(b.date));

  let heroNormal=false, heroSpecial=false, hero={}, heroId=null;
  let heroSpecialEyebrow='', heroSpecialTitle='', heroSpecialDesc='';

  if (type === 'emp') {
    heroSpecial = true;
    heroSpecialEyebrow = 'Good news';
    heroSpecialTitle = 'Nothing for you to file right now.';
    heroSpecialDesc = 'Your employer withholds tax from every payslip and files on your behalf. The one thing to watch for: collect your BIR Form 2316 by January 31 — it\'s your proof of tax paid for the year.';
  } else if (heroPool.length) {
    heroNormal = true;
    const h = heroPool[0]; heroId = h.id;
    const d = parseDate(h.date);
    hero = { title:h.t, desc:h.d, form:h.form, freq:h.freq, days:daysUntil(d), dateLabel:fmtDate(d), shift:h.shift||'' };
  } else {
    heroSpecial = true;
    heroSpecialEyebrow = 'All clear';
    heroSpecialTitle = 'No dated deadlines coming up.';
    heroSpecialDesc = 'Everything on your calendar is either done or ongoing. Keep invoicing and keeping your books — the next filing season will show up here.';
  }

  const heroFormGuide = heroNormal && FORMS_DATA.some(f => f.code === hero.form);
  function openFormGuide(code) {
    setState(s => ({ ...s, page:'forms', openForm:code, formQuery:'', formCat:'all' }));
  }

  const notHero = o => o.id !== heroId;
  const inThisMonth = d => d && d>=today && d.getMonth()===today.getMonth() && d.getFullYear()===today.getFullYear();
  const monthObs = applicable.filter(o => o.kind!=='ongoing' && notHero(o) && inThisMonth(effDate(o)));
  const monthItems = monthObs.map(feedItem);

  const laterObs = applicable.filter(o => o.kind!=='ongoing' && notHero(o) && effDate(o)>eom)
    .sort((a,b) => effDate(a) - effDate(b));
  const laterItems = laterObs.map(o => {
    const ed = effDate(o);
    return { dateTop:String(ed.getDate()), dateBot:mShort(ed), title:o.t, desc:o.d, tag:o.freq };
  });

  const alwaysItems = applicable.filter(o => o.kind==='ongoing')
    .map(o => ({ title:o.t, desc:o.d, tag:o.freq }));

  // timeline + table

  function statusFor(o, d) {
    if (!d) return {status:'Ongoing', color:'var(--mut)', soft:'#eef3f8'};
    const dd = daysUntil(d);

    if (dd<=30) return {status:'Due soon', color:'var(--warn)', soft:'var(--warnSoft)'};

    const sched = SCHED[type==='corp' ? 'corp' : 'se'];
    const doneCount = sched.filter(([,,ds]) => parseDate(ds) < today).length;

      const st = i < doneCount ? 'done' : (i === doneCount ? 'current' : 'todo');
      const label = st==='done' ? `${q} · filed ${lbl}` : `${q} · due ${lbl}`;
      return { st, label };
    });
    hasProgress = true;
    progress = { title:`${today.getFullYear()} filing progress`, barPct:`${Math.round(doneCount/sched.length*100)}%`, rows };
    if (type!=='corp') {
      hasSetAside = true;
      setAside = { amount:money(18400), basis:'8% of ₱230,000 taxable year-to-date' };
    }

  }

      <div className="wrap" style={{paddingTop:'26px',paddingBottom:'56px'}}>

          <div>

            <p className="pg-sub">{summaryLine}</p>
          </div>
          <Seg options={[['feed','Feed'],['timeline','Timeline'],['table','Table']]} value={view} onChange={k=>setState(s=>({...s,view:k}))} />

        <div style={{display:'flex',flexWrap:'wrap',gap:'28px',alignItems:'flex-start'}}>

            {/* FEED VIEW */}

                {heroNormal && (

                        <span style={{padding:'5px 10px',borderRadius:'7px',background:'rgba(255,255,255,.12)',fontSize:'12px',fontWeight:'600',color:'#e4eef6'}}>{hero.freq}</span>

                    <div key={i} style={{display:'flex',alignItems:'center',gap:'10px'}}>
                      <span style={markStyle(row.st)}>{row.st==='done'?'✓':''}</span>
                      <span style={labelStyle(row.st)}>{row.label}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {hasSetAside && (
              <div className="card tight" style={{marginTop:'16px'}}>
                <div style={{fontSize:'13px',fontWeight:'700',letterSpacing:'-.01em'}}>Set aside for tax</div>
                <div className="mono" style={{fontSize:'25px',fontWeight:'600',letterSpacing:'-.01em',marginTop:'9px'}}>{setAside.amount}</div>
                <div style={{fontSize:'12.5px',color:'var(--mut)',marginTop:'4px'}}>{setAside.basis}</div>
                <div style={{marginTop:'14px',paddingTop:'13px',borderTop:'1px solid var(--line2)',fontSize:'12.5px',color:'var(--mut)',lineHeight:'1.5'}}>
                  A running estimate — <button className="linkbtn" onClick={()=>setState(s=>({...s,page:'calculator'}))}>open the calculator</button> for the exact figure.
                </div>
              </div>
            )}
            {showRailNote && (
              <div style={{border:'1px solid var(--line)',borderRadius:'13px',background:'var(--accSoft)',padding:'18px'}}>
                <div style={{fontSize:'13px',fontWeight:'700',letterSpacing:'-.01em',color:'var(--accInk)'}}>{railNoteTitle}</div>
                <div style={{fontSize:'13px',color:'var(--accInk)',marginTop:'7px',lineHeight:'1.55',opacity:'.85'}}>{railNoteBody}</div>
              </div>
            )}
            <div className="card" style={{padding:'16px 18px',marginTop:'16px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'9px'}}>
                <span style={{width:'7px',height:'7px',borderRadius:'50%',background:'var(--warn)',display:'block'}}></span>
                <span style={{fontSize:'12px',fontWeight:'600',color:'var(--mut)'}}>Heads up</span>
              </div>
              <div style={{fontSize:'12.5px',color:'var(--mut)',marginTop:'8px',lineHeight:'1.55'}}>This is a reference tool, not formal tax advice. Verify dates and rates against the BIR before filing.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Calculator page ────────────────────────────────────────────────────────
function CalculatorPage({ state, setState }) {
  const { gross, expenses, cwt } = state;

  function setNum(key, e) {
    const v = parseInt(String(e.target.value).replace(/[^0-9]/g,'')) || 0;
    setState(s => ({...s, [key]: v}));
  }

  const vat = gross > VAT_THRESHOLD;
  const elig8 = !vat;
  const base8 = Math.max(0, gross-250000), tax8 = base8*0.08;
  const pct = vat ? 0 : gross*0.03;
  const osdDed = gross*0.40, osdNet = gross-osdDed, osdInc = gradTax(osdNet), osdTot = osdInc+pct;
  const itemNet = Math.max(0, gross-expenses), itemInc = gradTax(itemNet), itemTot = itemInc+pct;

  const cards = [
    {key:'8pct', name:'8% flat tax',             eligible:elig8, income:tax8,    pct:0,   total:tax8,    form:'Files: 1701Q + 1701A'},
    {key:'osd',  name:'Graduated + OSD',          eligible:true,  income:osdInc,  pct,     total:osdTot,  form:'Files: 1701A + 2551Q'},
    {key:'item', name:'Graduated + itemized',     eligible:true,  income:itemInc, pct,     total:itemTot, form:'Files: 1701 + 2551Q'},
  ];
  const eligible = cards.filter(c => c.eligible);
  const bestTotal = Math.min(...eligible.map(c => c.total));
  const best = eligible.find(c => c.total===bestTotal);
  const others = eligible.filter(c => c!==best).map(c => c.total).sort((a,b)=>a-b);
  const nextTotal = others.length ? others[0] : null;

  let recoText;
  if (nextTotal!=null) {
    const save = Math.round(nextTotal-best.total);
    recoText = best.name+' is your cheapest option at '+money(best.total)+(save>0?' — saving '+money(save)+' versus the next best.':' (tied with another option).');
  } else {
    recoText = best.name+' applies at '+money(best.total)+'.';
  }

  // breakdown rows
  let rows = [];
  const r = (label,value,o={}) => ({label,value,strong:false,rule:false,sub:'',...o});
  if (best.key==='8pct') {
    rows=[r('Gross sales / receipts',money(gross)),r('Less: annual allowance','('+money(250000)+')'),r('Taxable base',money(base8),{rule:true}),r('Income tax @ 8%',money(tax8),{strong:true}),r('Percentage tax','₱0',{sub:'The 8% rate is in lieu of the 3% percentage tax'})];
  } else if (best.key==='osd') {
    rows=[r('Gross sales / receipts',money(gross)),r('Less: OSD (40% of gross)','('+money(osdDed)+')'),r('Net taxable income',money(osdNet),{rule:true}),r('Graduated income tax',money(osdInc),{strong:true})];
    rows.push(vat ? r('Business tax','VAT 12%',{sub:'Above ₱3M you register for VAT — computed separately on value added.'}) : r('Percentage tax (3% of gross)',money(pct),{strong:true}));
  } else {
    rows=[r('Gross sales / receipts',money(gross)),r('Less: itemized expenses','('+money(expenses)+')'),r('Net taxable income',money(itemNet),{rule:true}),r('Graduated income tax',money(itemInc),{strong:true})];
    rows.push(vat ? r('Business tax','VAT 12%',{sub:'Above ₱3M you register for VAT — computed separately on value added.'}) : r('Percentage tax (3% of gross)',money(pct),{strong:true}));
  }
  rows.push(r('Total annual tax',money(best.total),{strong:true,rule:true}));
  const netDue = best.total - cwt;
  if (cwt>0) {
    rows.push(r('Less: creditable tax withheld (2307s)','('+money(cwt)+')'));
    if (netDue >= 0) rows.push(r('Tax still payable',money(netDue),{strong:true}));
    else rows.push(r('Overpayment — refund or carry over',money(-netDue),{strong:true,sub:'Excess credits can be refunded or carried forward to next year\'s returns.'}));
  }

  const taxableBase = best.key==='8pct' ? base8 : (best.key==='osd' ? osdNet : itemNet);
  const formTitle = best.key==='item' ? 'BIR Form 1701' : 'BIR Form 1701A';
  const formRows = [
    {no:'19', label:'Net taxable income',     value:money(taxableBase)},
    {no:'20', label:'Income tax due',          value:money(best.income)},
    {no:'—',  label:vat?'Business tax (VAT)':'Percentage tax (2551Q)', value:vat?'VAT 12%':(best.pct>0?money(best.pct):'—')},
    {no:'26', label:'Total tax payable'+(cwt>0?' (net of CWT)':''),    value:money(Math.max(0,netDue))},
  ];

  return (
    <div className="page wrap" style={{paddingTop:'26px',paddingBottom:'64px'}}>
      <div style={{marginBottom:'20px'}}>
        <h1 className="pg-h1">Which regime saves you the most?</h1>
        <p className="pg-sub">Enter your numbers once — compare 8%, graduated + OSD, and graduated + itemized, with the full math.</p>
      </div>

      {/* inputs */}
      <div className="card pad">
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:'18px'}}>
          <NumField label="Gross sales / receipts · year" value={gross} onChange={e=>setNum('gross',e)} prefix="₱" lg />
          <NumField label="Itemized expenses" value={expenses} onChange={e=>setNum('expenses',e)} prefix="₱" />
          <NumField label="Tax already withheld" value={cwt} onChange={e=>setNum('cwt',e)} prefix="₱" />
        </div>
        <div style={{display:'flex',gap:'8px',marginTop:'16px',flexWrap:'wrap'}}>
          {['Self-Employed','Non-VAT','Pure professional','CWT credited against income tax'].map(t => (
            <span key={t} className="chip">{t}</span>
          ))}
        </div>
      </div>

      {/* VAT notice */}
      {vat && (
        <div style={{marginTop:'16px',background:'var(--warnSoft)',border:'1px solid #e7d3ad',borderRadius:'12px',padding:'15px 18px',display:'flex',alignItems:'flex-start',gap:'12px'}}>
          <span style={{width:'8px',height:'8px',borderRadius:'50%',background:'var(--warn)',marginTop:'6px',flexShrink:0,display:'block'}}></span>
          <span style={{fontSize:'13.5px',color:'#7a5a1f',lineHeight:'1.5'}}>You're above the <b>₱3,000,000 VAT threshold</b>. The 8% and 3% percentage-tax options no longer apply — you must register for VAT (12%). The figures below cover <b>income tax only</b>; VAT is computed separately on your value added.</span>
        </div>
      )}

      {/* comparison cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'14px',marginTop:'16px'}}>
        {cards.map(c => {
          const isBest = c.eligible && c===best;
          return (
            <div key={c.key} style={{
              borderRadius:'13px', padding:'18px', transition:'border-color .2s, background .2s',
              border: isBest ? '1.5px solid var(--acc)' : '1.5px solid var(--line)',
              background: isBest ? 'var(--accSoft)' : 'var(--sf)',
              opacity: c.eligible ? 1 : 0.6,
            }}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px'}}>
                <span style={{fontWeight:'700',fontSize:'14.5px'}}>{c.name}</span>
                {isBest && <span style={{fontSize:'10px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.05em',padding:'3px 8px',borderRadius:'100px',background:'var(--good)',color:'#fff'}}>Lowest</span>}
                {!c.eligible && <span style={{fontSize:'10px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.05em',padding:'3px 8px',borderRadius:'100px',background:'#eef3f8',color:'var(--mut)'}}>N/A</span>}
              </div>
              <div className="mono" style={{fontSize:'26px',fontWeight:'600',letterSpacing:'-.01em',marginTop:'10px',color:isBest?'var(--accInk)':'var(--ink)'}}>{c.eligible?money(c.total):'—'}</div>
              <div style={{fontSize:'12px',color:'var(--mut)',marginTop:'3px'}}>{c.eligible?'estimated annual tax':'Over ₱3M — VAT instead'}</div>
              <div style={{marginTop:'14px',paddingTop:'13px',borderTop:'1px solid var(--line2)',display:'flex',flexDirection:'column',gap:'7px'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:'12.5px',color:'var(--mut)'}}>Income tax</span>
                  <span className="mono" style={{fontSize:'12.5px',fontWeight:'600'}}>{c.eligible?money(c.income):'—'}</span>
                </div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:'12.5px',color:'var(--mut)'}}>Percentage tax</span>
                  <span className="mono" style={{fontSize:'12.5px',fontWeight:'600'}}>{c.eligible?(vat?'VAT 12%':(c.pct>0?money(c.pct):'₱0')):'—'}</span>
                </div>
              </div>
              <div style={{marginTop:'12px',fontSize:'11.5px',color:'var(--dim)'}}>{c.form}</div>
            </div>
          );
        })}
      </div>

      {/* recommendation */}
      <div style={{marginTop:'16px',background:'var(--brand)',color:'#fff',borderRadius:'13px',padding:'17px 20px',display:'flex',alignItems:'center',gap:'13px'}}>
        <span style={{width:'26px',height:'26px',borderRadius:'50%',background:'var(--good)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',flexShrink:0}}>✓</span>
        <span style={{fontSize:'15px',fontWeight:'600',lineHeight:'1.4'}}>{recoText}</span>
      </div>

      {/* breakdown + form preview */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'20px',marginTop:'20px',alignItems:'start'}}>
        <div className="card pad">
          <h3 className="sec-h">How we got there — {best.name}</h3>
          <div style={{marginTop:'8px'}}>
            {rows.map((x,i) => (
              <div key={i}>
                <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:'16px',padding:'9px 0',borderTop:x.rule?'1px solid var(--line)':undefined,marginTop:x.rule?'2px':undefined}}>
                  <span style={{fontSize:'13.5px',color:x.strong?'var(--ink)':'var(--mut)',fontWeight:x.strong?'600':'400'}}>{x.label}</span>
                  <span className="mono" style={{fontSize:'14px',fontWeight:x.strong?'700':'500'}}>{x.value}</span>
                </div>
                {x.sub && <div style={{fontSize:'12px',color:'var(--mut)',marginTop:'-3px',paddingBottom:'6px',fontStyle:'italic'}}>{x.sub}</div>}
              </div>
            ))}
          </div>
        </div>
        <div className="card" style={{overflow:'hidden'}}>
          <div style={{background:'#f3f7fb',borderBottom:'1px solid var(--line)',padding:'15px 18px'}}>
            <div className="mono" style={{fontSize:'11px',letterSpacing:'.08em',textTransform:'uppercase',color:'var(--mut)'}}>Form preview</div>
            <div style={{fontWeight:'700',fontSize:'14.5px',marginTop:'3px'}}>{formTitle}</div>
          </div>
          <div style={{padding:'6px 18px 16px'}}>
            {formRows.map((f,i) => (
              <div key={i} style={{display:'flex',alignItems:'center',gap:'12px',padding:'11px 0',borderTop:'1px solid var(--line2)'}}>
                <span className="mono" style={{fontSize:'11px',color:'var(--dim)',width:'18px',flexShrink:0}}>{f.no}</span>
                <span style={{flex:1,fontSize:'13px',color:'var(--mut)'}}>{f.label}</span>
                <span className="mono" style={{fontSize:'13.5px',fontWeight:'600'}}>{f.value}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Forms page ─────────────────────────────────────────────────────────────
function FormsPage({ state, setState }) {
  const { formQuery, formCat, openForm } = state;
  const q = formQuery.toLowerCase();

  const cats = [['all','All'],['income','Income tax'],['business','Business tax'],['withholding','Withholding'],['registration','Registration']];

  const filtered = FORMS_DATA.filter(f =>
    (formCat==='all' || f.cat===formCat) &&
    (!q || (f.code+' '+f.name+' '+f.summary).toLowerCase().includes(q))
  );

  return (
    <div className="page wrap" style={{paddingTop:'26px',paddingBottom:'64px'}}>
      <div style={{marginBottom:'18px'}}>
        <h1 className="pg-h1">BIR form reference</h1>
        <p className="pg-sub">Every form a freelancer — or small business — is likely to meet, in plain language. Tap one for what it's for, who files it, and the boxes that matter.</p>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap',marginBottom:'18px'}}>
        <div className="search-w">
          <span style={{color:'var(--dim)',fontSize:'14px'}}>⌕</span>
          <input type="text" value={formQuery} aria-label="Search forms" onChange={e=>setState(s=>({...s,formQuery:e.target.value}))} placeholder="Search forms…" />
        </div>
        <Seg options={cats} value={formCat} onChange={k=>setState(s=>({...s,formCat:k}))} />
      </div>
      {filtered.length===0 && (
        <div className="card pad" style={{textAlign:'center',color:'var(--mut)'}}>No forms match “{formQuery}”. Try a code like 1701Q or a word like “withholding”.</div>
      )}
      <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
        {filtered.map(f => {
          const isOpen = openForm===f.code;
          return (
            <div key={f.code} className={isOpen?undefined:'click'} style={{border:`1.5px solid ${isOpen?'var(--acc)':'var(--line)'}`,borderRadius:'13px',background:'var(--sf)',overflow:'hidden',transition:'border-color .15s, box-shadow .2s'}}>
              <div role="button" tabIndex={0} aria-expanded={isOpen}
                onClick={() => setState(s=>({...s,openForm:isOpen?null:f.code}))}
                onKeyDown={e => { if(e.key==='Enter'||e.key===' '){ e.preventDefault(); setState(s=>({...s,openForm:isOpen?null:f.code})); } }}
                style={{display:'flex',alignItems:'center',gap:'16px',padding:'16px 18px',cursor:'pointer'}}>
                <span className="formcode">{f.code}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:'600',fontSize:'14.5px'}}>{f.name}</div>
                  <div style={{fontSize:'12.5px',color:'var(--mut)',marginTop:'2px'}}>{f.who}</div>
                </div>
                <span className="mono" style={{fontSize:'12px',color:'var(--mut)',whiteSpace:'nowrap',flexShrink:0}}>{f.when}</span>
                <span className="mono" style={{fontSize:'18px',color:'var(--dim)',width:'16px',textAlign:'center',flexShrink:0}}>{isOpen?'–':'+'}</span>
              </div>
              {isOpen && (
                <div className="acc-body" style={{padding:'0 18px 18px',borderTop:'1px solid var(--line2)'}}>
                  <p style={{fontSize:'14px',lineHeight:'1.6',marginTop:'14px'}}>{f.summary}</p>
                  {f.lines && f.lines.length>0 && (
                    <div style={{marginTop:'14px',display:'flex',flexDirection:'column',gap:'9px'}}>
                      {f.lines.map((ln,i) => (
                        <div key={i} style={{display:'flex',gap:'12px',alignItems:'baseline'}}>
                          <span className="boxcode">{ln.box}</span>
                          <span style={{fontSize:'13.5px',color:'var(--mut)',lineHeight:'1.5'}}>{ln.desc}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Tools page ─────────────────────────────────────────────────────────────
function ToolsPage({ state, setState }) {
  const { penDue, penDays, penEopt, whComp, ytdGross, ytdMonths } = state;

  function setNum(key, e) {
    const v = parseInt(String(e.target.value).replace(/[^0-9]/g,'')) || 0;
    setState(s => ({...s, [key]: v}));
  }

  // EOPT (RA 11976): micro & small taxpayers get a 10% surcharge (vs 25%)
  // and half the Sec 249 interest rate (6% vs 12% per year).
  const surRate = penEopt?0.10:0.25, intRate = penEopt?0.06:0.12;
  const surcharge = penDue*surRate, interest = penDue*intRate*(penDays/365), comp = compromise(penDue);
  const penTotal = penDue+surcharge+interest+comp;
  const penRows = [
    {label:'Basic tax due',                                       value:money(penDue)},
    {label:`Surcharge (${Math.round(surRate*100)}%)`,             value:money(surcharge)},
    {label:`Interest · ${penDays} days @ ${Math.round(intRate*100)}%/yr`, value:money(interest)},
    {label:'Compromise penalty',                                  value:money(comp)},
  ];

  const whTax = monthlyWH(whComp), whRate = whComp>0 ? (whTax/whComp*100) : 0;

  const mIn = Math.min(12, Math.max(0, ytdMonths));
  const projAnnual = mIn>0 ? ytdGross/mIn*12 : 0;
  const proj8 = Math.max(0,(projAnnual-250000))*0.08, perMonth = proj8/12;
  const projVat = projAnnual > VAT_THRESHOLD;

  return (
    <div className="page wrap" style={{paddingTop:'26px',paddingBottom:'64px'}}>
      <div style={{marginBottom:'20px'}}>
        <h1 className="pg-h1">Tools &amp; calculators</h1>

        <h3 style={{fontSize:'16px',fontWeight:'700',letterSpacing:'-.01em'}}>Late-filing penalty estimator</h3>

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'16px',marginTop:'18px',alignItems:'end'}}>
          <NumField label="Basic tax due" value={penDue} onChange={e=>setNum('penDue',e)} prefix="₱" />
          <NumField label="Days late" value={penDays} onChange={e=>setNum('penDays',e)} />
          <div>
            <label className="lbl" style={{marginBottom:'8px'}}>Taxpayer size</label>
            <Seg options={[['eopt','Micro / Small'],['reg','Regular']]} value={penEopt?'eopt':'reg'} onChange={k=>setState(s=>({...s,penEopt:k==='eopt'}))} />
          </div>
        </div>
        <div style={{marginTop:'18px',borderTop:'1px solid var(--line2)',paddingTop:'6px'}}>
          {penRows.map((row,i) => (
            <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0'}}>
              <span style={{fontSize:'13.5px',color:'var(--mut)'}}>{row.label}</span>
              <span className="mono" style={{fontSize:'13.5px',fontWeight:'500'}}>{row.value}</span>
            </div>
          ))}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0 2px',borderTop:'1px solid var(--line)',marginTop:'4px'}}>
            <span style={{fontSize:'14px',fontWeight:'700'}}>Estimated total to pay</span>
            <span className="mono" style={{fontSize:'20px',fontWeight:'600',color:'var(--accInk)'}}>{money(penTotal)}</span>
          </div>
        </div>
      </div>

      {/* withholding + ytd */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:'16px'}}>
        <div className="card pad">
          <h3 style={{fontSize:'16px',fontWeight:'700',letterSpacing:'-.01em'}}>Compensation withholding</h3>
          <p style={{fontSize:'13.5px',color:'var(--mut)',marginTop:'3px'}}>Monthly tax to withhold from an employee's taxable pay (TRAIN table, 2023 onward).</p>
          <div style={{marginTop:'18px'}}>
            <NumField label="Monthly taxable pay" value={whComp} onChange={e=>setNum('whComp',e)} prefix="₱" />
          </div>
          <div style={{marginTop:'18px',background:'var(--accSoft)',borderRadius:'11px',padding:'16px'}}>
            <div style={{fontSize:'12px',color:'var(--accInk)',fontWeight:'600'}}>Tax to withhold each month</div>
            <div className="mono" style={{fontSize:'24px',fontWeight:'600',color:'var(--accInk)',marginTop:'5px'}}>{money(whTax)}</div>
            <div style={{fontSize:'12.5px',color:'var(--accInk)',opacity:'.8',marginTop:'3px'}}>Effective rate {whRate.toFixed(1)}%</div>
          </div>
        </div>
        <div className="card pad">
          <h3 style={{fontSize:'16px',fontWeight:'700',letterSpacing:'-.01em'}}>Year-to-date projector</h3>
          <p style={{fontSize:'13.5px',color:'var(--mut)',marginTop:'3px'}}>Where your annual income and 8% tax are heading.</p>
          <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:'12px',marginTop:'18px'}}>
            <NumField label="Gross so far" value={ytdGross} onChange={e=>setNum('ytdGross',e)} prefix="₱" />
            <NumField label="Months in" value={ytdMonths} onChange={e=>setNum('ytdMonths',e)} />

          <div style={{marginTop:'18px',display:'flex',flexDirection:'column',gap:'9px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:'13.5px',color:'var(--mut)'}}>Projected annual income</span>
              <span className="mono" style={{fontSize:'14px',fontWeight:'600'}}>{money(projAnnual)}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:'13.5px',color:'var(--mut)'}}>Estimated 8% tax</span>
              <span className="mono" style={{fontSize:'14px',fontWeight:'600'}}>{money(proj8)}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',borderTop:'1px solid var(--line2)',paddingTop:'9px'}}>
              <span style={{fontSize:'13.5px',fontWeight:'600'}}>Set aside / month</span>
              <span className="mono" style={{fontSize:'16px',fontWeight:'600',color:'var(--accInk)'}}>{money(perMonth)}</span>
            </div>
          </div>
          {projVat && <div className="mini-warn">You're projected to pass the ₱3M VAT threshold — the 8% option won't be available at that level, and VAT registration kicks in. Run the calculator with your full-year figure.</div>}
        </div>
      </div>
    </div>
  );
}

// ── Blog page ──────────────────────────────────────────────────────────────
function BlogPage({ state, setState }) {
  const { blogPost } = state;

  if (!blogPost) {
    const featured = POSTS.find(p=>p.feature) || POSTS[0];
    const rest = POSTS.filter(p=>p!==featured);
    return (
      <div className="page wrap" style={{paddingTop:'34px',paddingBottom:'64px'}}>
        <div style={{marginBottom:'26px'}}>
          <div className="mono" style={{fontSize:'11.5px',fontWeight:'500',letterSpacing:'.13em',textTransform:'uppercase',color:'var(--acc)'}}>The Present Value Journal</div>
          <h1 style={{fontSize:'30px',fontWeight:'800',letterSpacing:'-.025em',marginTop:'10px'}}>Plain-language tax, for people who'd rather be working</h1>
        </div>
        {/* featured */}
        <div className="card click" onClick={() => setState(s=>({...s,blogPost:featured.id}))} style={{borderRadius:'16px',overflow:'hidden',display:'flex',flexWrap:'wrap'}}>
          <div style={{flex:'1 1 200px',background:'linear-gradient(150deg,var(--brand),var(--brand2))',padding:'28px',display:'flex',flexDirection:'column',justifyContent:'space-between',gap:'22px'}}>
            <span style={{fontSize:'11.5px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em',color:'#a9cde6'}}>{featured.cat}</span>
            <span className="mono" style={{fontSize:'12px',color:'#cdddea'}}>{featured.read} · {featured.date}</span>
          </div>
          <div style={{flex:'2.4 1 300px',padding:'28px'}}>
            <div style={{fontSize:'11px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--acc)'}}>Featured</div>
            <h2 style={{fontSize:'23px',fontWeight:'700',letterSpacing:'-.02em',lineHeight:'1.2',marginTop:'10px'}}>{featured.title}</h2>
            <p style={{fontSize:'14.5px',color:'var(--mut)',lineHeight:'1.6',marginTop:'11px'}}>{featured.excerpt}</p>
            <div style={{marginTop:'16px',fontSize:'13.5px',fontWeight:'600',color:'var(--accInk)'}}>Read article →</div>
          </div>
        </div>
        {/* list */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:'16px',marginTop:'18px'}}>
          {rest.map(p => (
            <div key={p.id} className="card click" onClick={() => setState(s=>({...s,blogPost:p.id}))} style={{padding:'20px',display:'flex',flexDirection:'column'}}>
              <span style={{fontSize:'11px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.07em',color:'var(--acc)'}}>{p.cat}</span>
              <h3 style={{fontSize:'16.5px',fontWeight:'700',letterSpacing:'-.015em',lineHeight:'1.25',marginTop:'10px'}}>{p.title}</h3>
              <p style={{fontSize:'13.5px',color:'var(--mut)',lineHeight:'1.55',marginTop:'9px',flex:1}}>{p.excerpt}</p>
              <div className="mono" style={{fontSize:'11.5px',color:'var(--dim)',marginTop:'14px'}}>{p.read} · {p.date}</div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  const p = POSTS.find(x=>x.id===blogPost) || POSTS[0];
  return (
    <div className="page" style={{maxWidth:'680px',margin:'0 auto',padding:'30px 28px 72px'}}>
      <button className="linkbtn" style={{fontSize:'13.5px',color:'var(--mut)',marginBottom:'24px'}} onClick={() => setState(s=>({...s,blogPost:null}))}>← All articles</button>
      <div style={{fontSize:'11.5px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--acc)'}}>{p.cat}</div>
      <h1 style={{fontSize:'32px',fontWeight:'800',letterSpacing:'-.03em',lineHeight:'1.1',marginTop:'12px'}}>{p.title}</h1>
      <div className="mono" style={{fontSize:'12.5px',color:'var(--mut)',marginTop:'14px',paddingBottom:'24px',borderBottom:'1px solid var(--line)'}}>{p.read} · {p.date}</div>
      <div style={{marginTop:'8px'}}>
        {(p.body||[]).map((b,i) => (
          <div key={i}>
            {b.kind==='p' && <p style={{fontSize:'17px',lineHeight:'1.7',color:'#34465a',marginTop:'20px'}}>{b.text}</p>}
            {b.kind==='h' && <h2 style={{fontSize:'20px',fontWeight:'700',letterSpacing:'-.015em',marginTop:'32px'}}>{b.text}</h2>}
            {b.kind==='quote' && <blockquote style={{marginTop:'24px',padding:'4px 0 4px 22px',borderLeft:'3px solid var(--acc)',fontSize:'19px',lineHeight:'1.5',fontWeight:'500',color:'var(--brand)'}}>{b.text}</blockquote>}
            {b.kind==='list' && (
              <div style={{marginTop:'18px',display:'flex',flexDirection:'column',gap:'11px'}}>
                {b.items.map((t,j) => (
                  <div key={j} style={{display:'flex',gap:'13px',alignItems:'baseline'}}>
                    <span style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--acc)',flexShrink:0,marginTop:'8px',display:'block'}}></span>
                    <span style={{fontSize:'16.5px',lineHeight:'1.6',color:'#34465a'}}>{t}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── App root ───────────────────────────────────────────────────────────────
function App() {
  const [state, setState] = useState({
    type:'se', regime:'8pct', view:'feed', page:'calendar',
    gross:480000, expenses:180000, cwt:0,
    formQuery:'', formCat:'all', openForm:'1701Q',
    penDue:50000, penDays:60, penEopt:true,
    whComp:50000, ytdGross:240000, ytdMonths:6,
    blogPost:null,
  });

  const { page } = state;

  useEffect(() => { window.scrollTo(0, 0); }, [state.page, state.blogPost]);

  const pages = [
    ['calendar','Calendar'],
    ['calculator','Calculator'],
    ['forms','Forms'],
    ['tools','Tools'],
    ['blog','Blog'],
  ];

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <header className="hdr">
        <div className="hdr-left">
          <div className="brand">
            <div className="brand-mark">₱</div>
            <span className="brand-name">Present Value</span>
          </div>
          <nav className="nav" aria-label="Main">
            {pages.map(([k,l]) => (
              <button key={k} className={page===k?'active':''} onClick={() => setState(s=>({...s,page:k}))}>{l}</button>
            ))}
          </nav>
        </div>
        <div className="avatar" title="Demo profile — Maria">M</div>
      </header>

      <main style={{flex:1}}>
        {page==='calendar'   && <CalendarPage   state={state} setState={setState} />}
        {page==='calculator' && <CalculatorPage state={state} setState={setState} />}
        {page==='forms'      && <FormsPage      state={state} setState={setState} />}
        {page==='tools'      && <ToolsPage      state={state} setState={setState} />}
        {page==='blog'       && <BlogPage       state={state} setState={setState} />}
      </main>

      <footer className="ftr">
        <p>
          <b>Present Value</b> is a reference tool, not tax advice. Figures follow Philippine tax law as of TY 2026 —
          TRAIN (RA 10963), CREATE (RA 11534) and EOPT (RA 11976): graduated rates effective 2023 onward, the 8% option
          with its ₱250,000 allowance, 3% percentage tax, the ₱3,000,000 VAT threshold, and EOPT-reduced penalties for
          micro &amp; small taxpayers. Always verify dates and rates with the BIR before filing.
        </p>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
