// ── helpers ────────────────────────────────────────────────────────────────
function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function daysUntil(d) { return Math.round((d - TODAY) / 86400000); }
function fmtDate(d) { return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function mShort(d) { return d.toLocaleDateString('en-US',{month:'short'}).toUpperCase(); }
function money(n) { return '₱' + Math.round(n).toLocaleString('en-US'); }
function endOfMonth() { return new Date(TODAY.getFullYear(), TODAY.getMonth()+1, 0); }

function gradTax(n) {
  if (n <= 250000) return 0;
  if (n <= 400000) return (n-250000)*0.15;
  if (n <= 800000) return 22500+(n-400000)*0.20;
  if (n <= 2000000) return 102500+(n-800000)*0.25;
  if (n <= 8000000) return 402500+(n-2000000)*0.30;
  return 2202500+(n-8000000)*0.35;
}
function monthlyWH(x) {
  if (x <= 20833) return 0;
  if (x <= 33332) return (x-20833)*0.15;
  if (x <= 66666) return 1875+(x-33333)*0.20;
  if (x <= 166666) return 8541.80+(x-66667)*0.25;
  if (x <= 666666) return 33541.80+(x-166667)*0.30;
  return 183541.80+(x-666667)*0.35;
}
function compromise(a) {
  if (a <= 5000) return 1000;
  if (a <= 10000) return 3000;
  if (a <= 20000) return 5000;
  if (a <= 50000) return 10000;
  if (a <= 100000) return 15000;
  if (a <= 500000) return 20000;
  if (a <= 1000000) return 30000;
  return 50000;
}

function tagStyle() {

    fontSize:'11.5px', fontWeight:'600', padding:'5px 11px', borderRadius:'100px',
    background:'#eef3f8', color:'var(--mut)', whiteSpace:'nowrap', flexShrink:0,
  };
}

function effDate(o) {
  if (o.kind === 'dated') return parseDate(o.date);
  if (o.kind === 'monthly') return endOfMonth();
  return null;
}

function feedItem(o) {
  const ed = effDate(o);
  const it = { isDated: o.kind!=='ongoing', isOngoing: o.kind==='ongoing', title: o.t, desc: o.d };
  if (ed) { it.dateTop = String(ed.getDate()); it.dateBot = mShort(ed); }
  if (o.amt != null) { it.hasAmount=true; it.amount=(o.kind==='monthly'?'≈ ':'')+money(o.amt); it.hasTag=false; }
  else { it.hasAmount=false; it.hasTag=true; it.tag=o.freq; }
  return it;
}

        <div style={{fontSize:'13px',color:'var(--mut)',marginTop:'2px'}}>{item.desc}</div>

      {item.hasAmount && (

      {item.hasTag && <span style={tagStyle()}>{item.tag}</span>}

// ── Calendar page ──────────────────────────────────────────────────────────
function CalendarPage({ state, setState }) {
  const { type, regime, view } = state;
  const T = TYPES[type];

  function setType(t) {
    setState(s => ({ ...s, type: t, regime: TYPES[t].regimes[0].key }));
  }

  const applicable = OB.filter(o =>
    o.types.includes(type) && (o.reg === 'all' || o.reg.includes(regime))
  );
  const today = TODAY, eom = endOfMonth();

  const heroPool = applicable.filter(o => o.kind==='dated' && (o.cat==='income'||o.cat==='biz') && parseDate(o.date)>=today)
    .sort((a,b) => parseDate(a.date) - parseDate(b.date));

  let heroNormal=false, heroSpecial=false, hero={}, heroId=null;
  let heroSpecialTitle='', heroSpecialDesc='';

  if (type === 'emp') {
    heroSpecial = true;
    heroSpecialTitle = 'Nothing for you to file right now.';
    heroSpecialDesc = 'Your employer withholds tax from every payslip and files on your behalf. The one thing to watch for: collect your BIR Form 2316 by January 31 — it\'s your proof of tax paid for the year.';
  } else if (heroPool.length) {
    heroNormal = true;
    const h = heroPool[0]; heroId = h.id;
    const d = parseDate(h.date);
    hero = { title:h.t, desc:h.d, form:h.form, freq:h.freq, days:String(daysUntil(d)), dateLabel:fmtDate(d), shift:h.shift||'' };
  }

  const notHero = o => o.id !== heroId;
  const inThisMonth = d => d && d>=today && d.getMonth()===today.getMonth() && d.getFullYear()===today.getFullYear();
  const monthObs = applicable.filter(o => o.kind!=='ongoing' && notHero(o) && inThisMonth(effDate(o)));
  const monthItems = monthObs.map(feedItem);

  const laterObs = applicable.filter(o => o.kind==='dated' && notHero(o) && effDate(o)>eom)
    .sort((a,b) => parseDate(a.date) - parseDate(b.date));
  const laterItems = laterObs.map(o => {
    const ed = parseDate(o.date);
    return { dateTop:String(ed.getDate()), dateBot:mShort(ed), title:o.t, desc:o.d, tag:o.freq };
  });

  const alwaysItems = applicable.filter(o => o.kind==='ongoing')
    .map(o => ({ title:o.t, desc:o.d, tag:o.freq }));

  // timeline + table
  const sortable = applicable.map(o => ({o, d:effDate(o)}));
  sortable.sort((a,b) => { if(!a.d) return 1; if(!b.d) return -1; return a.d-b.d; });

  function statusFor(o, d) {
    if (!d) return {status:'Ongoing', color:'var(--mut)', soft:'#eef3f8'};
    const dd = daysUntil(d);
    if (dd<0)  return {status:'Filed',    color:'var(--good)', soft:'var(--goodSoft)'};
    if (dd<=30) return {status:'Due soon', color:'var(--warn)', soft:'var(--warnSoft)'};
    return {status:'Upcoming', color:'var(--accInk)', soft:'var(--accSoft)'};
  }

  // right rail progress
  let hasProgress=false, progress={}, hasSetAside=false, setAside={}, showRailNote=false, railNoteTitle='', railNoteBody='';
  function mk(st, label) {

            {hasProgress && (

// ── Calculator page ────────────────────────────────────────────────────────
function CalculatorPage({ state, setState }) {
  const { gross, expenses, cwt } = state;

  function setNum(key, e) {
    const v = parseInt(String(e.target.value).replace(/[^0-9]/g,'')) || 0;
    setState(s => ({...s, [key]: v}));
  }

  const vat = gross > 3000000;
  const elig8 = !vat;
  const base8 = Math.max(0, gross-250000), tax8 = base8*0.08;
  const pct = vat ? 0 : gross*0.03;
  const osdDed = gross*0.40, osdNet = gross-osdDed, osdInc = gradTax(osdNet), osdTot = osdInc+pct;
  const itemNet = Math.max(0, gross-expenses), itemInc = gradTax(itemNet), itemTot = itemInc+pct;

  const cards = [
    {key:'8pct', name:'8% flat tax',             eligible:elig8, income:tax8,    pct:0,   total:tax8,    form:'Files: 1701Q + 1701A'},
    {key:'osd',  name:'Graduated + OSD',          eligible:true,  income:osdInc,  pct,     total:osdTot,  form:'Files: 1701A + 2551Q'},
    {key:'item', name:'Graduated + itemized',     eligible:true,  income:itemInc, pct,     total:itemTot, form:'Files: 1701 + 2551Q'},
  ];
  const eligible = cards.filter(c => c.eligible);
  const bestTotal = Math.min(...eligible.map(c => c.total));
  const best = eligible.find(c => c.total===bestTotal);
  const others = eligible.filter(c => c!==best).map(c => c.total).sort((a,b)=>a-b);
  const nextTotal = others.length ? others[0] : null;

  let recoText;
  if (nextTotal!=null) {
    const save = Math.round(nextTotal-best.total);
    recoText = best.name+' is your cheapest option at '+money(best.total)+(save>0?' — saving '+money(save)+' versus the next best.':' (tied with another option).');
  } else {
    recoText = best.name+' applies at '+money(best.total)+'.';
  }

  // breakdown rows
  let rows = [];
  const r = (label,value,o={}) => ({label,value,strong:false,rule:false,sub:'',...o});
  if (best.key==='8pct') {
    rows=[r('Gross sales / receipts',money(gross)),r('Less: annual allowance','('+money(250000)+')'),r('Taxable base',money(base8),{rule:true}),r('Income tax @ 8%',money(tax8),{strong:true}),r('Percentage tax','₱0',{sub:'The 8% rate is in lieu of the 3% percentage tax'})];
  } else if (best.key==='osd') {
    rows=[r('Gross sales / receipts',money(gross)),r('Less: OSD (40% of gross)','('+money(osdDed)+')'),r('Net taxable income',money(osdNet),{rule:true}),r('Graduated income tax',money(osdInc),{strong:true})];
    rows.push(vat ? r('Business tax','VAT 12%',{sub:'Above ₱3M you register for VAT — computed separately on value added.'}) : r('Percentage tax (3% of gross)',money(pct),{strong:true}));
  } else {
    rows=[r('Gross sales / receipts',money(gross)),r('Less: itemized expenses','('+money(expenses)+')'),r('Net taxable income',money(itemNet),{rule:true}),r('Graduated income tax',money(itemInc),{strong:true})];
    rows.push(vat ? r('Business tax','VAT 12%',{sub:'Above ₱3M you register for VAT — computed separately on value added.'}) : r('Percentage tax (3% of gross)',money(pct),{strong:true}));
  }
  rows.push(r('Total annual tax',money(best.total),{strong:true,rule:true}));
  if (cwt>0) { rows.push(r('Less: tax already withheld','('+money(cwt)+')')); rows.push(r('Tax still payable',money(Math.max(0,best.total-cwt)),{strong:true})); }

  const taxableBase = best.key==='8pct' ? base8 : (best.key==='osd' ? osdNet : itemNet);
  const formTitle = best.key==='item' ? 'BIR Form 1701' : 'BIR Form 1701A';
  const formRows = [
    {no:'19', label:'Net taxable income',     value:money(taxableBase)},
    {no:'20', label:'Income tax due',          value:money(best.income)},
    {no:'—',  label:vat?'Business tax (VAT)':'Percentage tax (2551Q)', value:vat?'VAT 12%':(best.pct>0?money(best.pct):'—')},
    {no:'26', label:'Total tax payable'+(cwt>0?' (net of CWT)':''),    value:money(Math.max(0,best.total-cwt))},
  ];

  return (
    <div style={{maxWidth:'1080px',margin:'0 auto',padding:'26px 28px 64px'}}>
      <div style={{marginBottom:'20px'}}>
        <h1 style={{fontSize:'24px',fontWeight:'800',letterSpacing:'-.025em'}}>Which regime saves you the most?</h1>
        <p style={{fontSize:'14px',color:'var(--mut)',marginTop:'4px'}}>Enter your numbers once — compare 8%, graduated + OSD, and graduated + itemized, with the full math.</p>
      </div>

      {/* inputs */}
      <div style={{border:'1px solid var(--line)',borderRadius:'14px',background:'var(--sf)',padding:'22px'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:'18px'}}>
          {[
            {label:'Gross sales / receipts · year', key:'gross', size:'18px', val:gross},
            {label:'Itemized expenses',              key:'expenses', size:'15px', val:expenses},
            {label:'Tax already withheld',           key:'cwt', size:'15px', val:cwt},
          ].map(({label,key,size,val}) => (
            <div key={key}>
              <label style={{fontSize:'12px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.05em',color:'var(--mut)'}}>{label}</label>
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'8px',border:'1.5px solid var(--line)',borderRadius:'10px',padding:'9px 13px',background:'#fbfdff'}}>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:size,color:'var(--mut)'}}>₱</span>
                <input type="text" inputMode="numeric" value={val.toLocaleString('en-US')} onChange={e=>setNum(key,e)} style={{border:'none',outline:'none',background:'transparent',fontFamily:"'IBM Plex Mono',monospace",fontSize:size,fontWeight:'600',color:'var(--ink)',width:'100%',minWidth:0}} />
              </div>
            </div>
          ))}
        </div>
        <div style={{display:'flex',gap:'8px',marginTop:'16px',flexWrap:'wrap'}}>
          {['Self-Employed','Non-VAT','Pure professional','CWT credited to income tax'].map(t => (
            <span key={t} style={{padding:'5px 11px',borderRadius:'7px',background:'#eef3f8',fontSize:'12px',fontWeight:'600',color:'var(--mut)'}}>{t}</span>
          ))}
        </div>
      </div>

      {/* VAT notice */}
      {vat && (
        <div style={{marginTop:'16px',background:'var(--warnSoft)',border:'1px solid #e7d3ad',borderRadius:'12px',padding:'15px 18px',display:'flex',alignItems:'flex-start',gap:'12px'}}>
          <span style={{width:'8px',height:'8px',borderRadius:'50%',background:'var(--warn)',marginTop:'6px',flexShrink:0,display:'block'}}></span>
          <span style={{fontSize:'13.5px',color:'#7a5a1f',lineHeight:'1.5'}}>You're above the <b>₱3,000,000 VAT threshold</b>. The 8% and 3% percentage-tax options no longer apply — you must register for VAT (12%). The figures below cover <b>income tax only</b>; VAT is computed separately on your value added.</span>
        </div>
      )}

      {/* comparison cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:'14px',marginTop:'16px'}}>
        {cards.map(c => {
          const isBest = c.eligible && c===best;
          const cardStyle = {
            borderRadius:'13px', padding:'18px',
            border: isBest ? '1.5px solid var(--acc)' : '1.5px solid var(--line)',
            background: isBest ? 'var(--accSoft)' : 'var(--sf)',
            opacity: c.eligible ? 1 : 0.6,
          };
          return (
            <div key={c.key} style={cardStyle}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'8px'}}>
                <span style={{fontWeight:'700',fontSize:'14.5px'}}>{c.name}</span>

                {!c.eligible && <span style={{fontSize:'10px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.05em',padding:'3px 8px',borderRadius:'100px',background:'#eef3f8',color:'var(--mut)'}}>N/A</span>}
              </div>
              <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'26px',fontWeight:'600',letterSpacing:'-.01em',marginTop:'10px',color:isBest?'var(--accInk)':'var(--ink)'}}>{c.eligible?money(c.total):'—'}</div>
              <div style={{fontSize:'12px',color:'var(--mut)',marginTop:'3px'}}>{c.eligible?'estimated annual tax':'Over ₱3M — VAT instead'}</div>
              <div style={{marginTop:'14px',paddingTop:'13px',borderTop:'1px solid var(--line2)',display:'flex',flexDirection:'column',gap:'7px'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:'12.5px',color:'var(--mut)'}}>Income tax</span>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'12.5px',fontWeight:'600',color:'var(--ink)'}}>{c.eligible?money(c.income):'—'}</span>
                </div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:'12.5px',color:'var(--mut)'}}>Percentage tax</span>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'12.5px',fontWeight:'600',color:'var(--ink)'}}>{c.eligible?(vat?'VAT 12%':(c.pct>0?money(c.pct):'₱0')):'—'}</span>
                </div>
              </div>
              <div style={{marginTop:'12px',fontSize:'11.5px',color:'var(--dim)'}}>{c.form}</div>
            </div>
          );
        })}
      </div>

      {/* recommendation */}
      <div style={{marginTop:'16px',background:'var(--brand)',color:'#fff',borderRadius:'13px',padding:'17px 20px',display:'flex',alignItems:'center',gap:'13px'}}>
        <span style={{width:'26px',height:'26px',borderRadius:'50%',background:'var(--good)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'14px',flexShrink:0}}>✓</span>
        <span style={{fontSize:'15px',fontWeight:'600',lineHeight:'1.4'}}>{recoText}</span>
      </div>

      {/* breakdown + form preview */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:'20px',marginTop:'20px',alignItems:'start'}}>
        <div style={{border:'1px solid var(--line)',borderRadius:'14px',background:'var(--sf)',padding:'22px'}}>
          <h3 style={{fontSize:'15px',fontWeight:'700',letterSpacing:'-.01em'}}>How we got there — {best.name}</h3>
          <div style={{marginTop:'8px'}}>
            {rows.map((x,i) => (
              <div key={i}>
                <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:'16px',padding:'9px 0',borderTop:x.rule?'1px solid var(--line)':undefined,marginTop:x.rule?'2px':undefined}}>
                  <span style={{fontSize:'13.5px',color:x.strong?'var(--ink)':'var(--mut)',fontWeight:x.strong?'600':'400'}}>{x.label}</span>
                  <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'14px',color:'var(--ink)',fontWeight:x.strong?'700':'500'}}>{x.value}</span>
                </div>
                {x.sub && <div style={{fontSize:'12px',color:'var(--mut)',marginTop:'-3px',paddingBottom:'6px',fontStyle:'italic'}}>{x.sub}</div>}
              </div>
            ))}
          </div>
        </div>
        <div style={{border:'1px solid var(--line)',borderRadius:'14px',background:'var(--sf)',overflow:'hidden'}}>
          <div style={{background:'#f3f7fb',borderBottom:'1px solid var(--line)',padding:'15px 18px'}}>
            <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'11px',letterSpacing:'.08em',textTransform:'uppercase',color:'var(--mut)'}}>Form preview</div>
            <div style={{fontWeight:'700',fontSize:'14.5px',marginTop:'3px'}}>{formTitle}</div>
          </div>
          <div style={{padding:'6px 18px 16px'}}>
            {formRows.map((f,i) => (
              <div key={i} style={{display:'flex',alignItems:'center',gap:'12px',padding:'11px 0',borderTop:'1px solid var(--line2)'}}>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'11px',color:'var(--dim)',width:'18px',flexShrink:0}}>{f.no}</span>
                <span style={{flex:1,fontSize:'13px',color:'var(--mut)'}}>{f.label}</span>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'13.5px',fontWeight:'600',color:'var(--ink)'}}>{f.value}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Forms page ─────────────────────────────────────────────────────────────

  const filtered = FORMS_DATA.filter(f =>

      <div style={{display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap',marginBottom:'18px'}}>

        </div>
        <SegmentedGroup>
          {cats.map(([k,l]) => (
            <button key={k} style={segStyle(formCat===k)} onClick={() => setState(s=>({...s,formCat:k}))}>{l}</button>

                <div style={{flex:1,minWidth:0}}>

                  <div style={{fontSize:'12.5px',color:'var(--mut)',marginTop:'2px'}}>{f.who}</div>
                </div>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'12px',color:'var(--mut)',whiteSpace:'nowrap',flexShrink:0}}>{f.when}</span>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'18px',color:'var(--dim)',width:'16px',textAlign:'center',flexShrink:0}}>{isOpen?'–':'+'}</span>
              </div>
              {isOpen && (
                <div style={{padding:'0 18px 18px',borderTop:'1px solid var(--line2)'}}>
                  <p style={{fontSize:'14px',lineHeight:'1.6',color:'var(--ink)',marginTop:'14px'}}>{f.summary}</p>

// ── Tools page ─────────────────────────────────────────────────────────────
function ToolsPage({ state, setState }) {
  const { penDue, penDays, penEopt, whComp, ytdGross, ytdMonths } = state;

  function setNum(key, e) {
    const v = parseInt(String(e.target.value).replace(/[^0-9]/g,'')) || 0;
    setState(s => ({...s, [key]: v}));
  }

  const surRate = penEopt?0.10:0.25, intRate = penEopt?0.06:0.12;
  const surcharge = penDue*surRate, interest = penDue*intRate*(penDays/365), comp = compromise(penDue);
  const penTotal = penDue+surcharge+interest+comp;
  const penRows = [
    {label:'Basic tax due',                                       value:money(penDue)},
    {label:`Surcharge (${Math.round(surRate*100)}%)`,             value:money(surcharge)},
    {label:`Interest · ${penDays} days @ ${Math.round(intRate*100)}%/yr`, value:money(interest)},
    {label:'Compromise penalty',                                  value:money(comp)},
  ];

  const whTax = monthlyWH(whComp), whRate = whComp>0 ? (whTax/whComp*100) : 0;

  const projAnnual = ytdMonths>0 ? ytdGross/ytdMonths*12 : 0;
  const proj8 = Math.max(0,(projAnnual-250000))*0.08, perMonth = proj8/12;

  return (
    <div style={{maxWidth:'1080px',margin:'0 auto',padding:'26px 28px 64px'}}>
      <div style={{marginBottom:'20px'}}>
        <h1 style={{fontSize:'24px',fontWeight:'800',letterSpacing:'-.025em'}}>Tools &amp; calculators</h1>
        <p style={{fontSize:'14px',color:'var(--mut)',marginTop:'4px'}}>Quick utilities for the in-between moments — estimate a penalty, figure out withholding, or project where your year is heading.</p>
      </div>

      {/* penalty */}
      <div style={{border:'1px solid var(--line)',borderRadius:'14px',background:'var(--sf)',padding:'22px',marginBottom:'16px'}}>
        <h3 style={{fontSize:'16px',fontWeight:'700',letterSpacing:'-.01em'}}>Late-filing penalty estimator</h3>
        <p style={{fontSize:'13.5px',color:'var(--mut)',marginTop:'3px'}}>Surcharge, interest and compromise penalty if you miss a deadline. EOPT gives micro &amp; small taxpayers reduced rates.</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'16px',marginTop:'18px',alignItems:'end'}}>
          <div>
            <label style={{fontSize:'12px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.05em',color:'var(--mut)'}}>Basic tax due</label>
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'8px',border:'1.5px solid var(--line)',borderRadius:'10px',padding:'9px 13px',background:'#fbfdff'}}>
              <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'15px',color:'var(--mut)'}}>₱</span>
              <input type="text" inputMode="numeric" value={penDue.toLocaleString('en-US')} onChange={e=>setNum('penDue',e)} style={{border:'none',outline:'none',background:'transparent',fontFamily:"'IBM Plex Mono',monospace",fontSize:'15px',fontWeight:'600',color:'var(--ink)',width:'100%',minWidth:0}} />
            </div>
          </div>
          <div>
            <label style={{fontSize:'12px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.05em',color:'var(--mut)'}}>Days late</label>
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'8px',border:'1.5px solid var(--line)',borderRadius:'10px',padding:'9px 13px',background:'#fbfdff'}}>
              <input type="text" inputMode="numeric" value={String(penDays)} onChange={e=>setNum('penDays',e)} style={{border:'none',outline:'none',background:'transparent',fontFamily:"'IBM Plex Mono',monospace",fontSize:'15px',fontWeight:'600',color:'var(--ink)',width:'100%',minWidth:0}} />
            </div>
          </div>
          <div>
            <label style={{fontSize:'12px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.05em',color:'var(--mut)'}}>Taxpayer size</label>
            <SegmentedGroup>
              <button style={segStyle(penEopt)} onClick={() => setState(s=>({...s,penEopt:true}))}>Micro / Small</button>
              <button style={segStyle(!penEopt)} onClick={() => setState(s=>({...s,penEopt:false}))}>Regular</button>
            </SegmentedGroup>
          </div>
        </div>
        <div style={{marginTop:'18px',borderTop:'1px solid var(--line2)',paddingTop:'6px'}}>
          {penRows.map((row,i) => (
            <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0'}}>
              <span style={{fontSize:'13.5px',color:'var(--mut)'}}>{row.label}</span>
              <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'13.5px',fontWeight:'500',color:'var(--ink)'}}>{row.value}</span>
            </div>
          ))}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 0 2px',borderTop:'1px solid var(--line)',marginTop:'4px'}}>
            <span style={{fontSize:'14px',fontWeight:'700',color:'var(--ink)'}}>Estimated total to pay</span>
            <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'20px',fontWeight:'600',color:'var(--accInk)'}}>{money(penTotal)}</span>
          </div>
        </div>
      </div>

      {/* withholding + ytd */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:'16px'}}>
        <div style={{border:'1px solid var(--line)',borderRadius:'14px',background:'var(--sf)',padding:'22px'}}>
          <h3 style={{fontSize:'16px',fontWeight:'700',letterSpacing:'-.01em'}}>Compensation withholding</h3>

          <div style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'8px',border:'1.5px solid var(--line)',borderRadius:'10px',padding:'9px 13px',background:'#fbfdff'}}>
            <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'15px',color:'var(--mut)'}}>₱</span>
            <input type="text" inputMode="numeric" value={whComp.toLocaleString('en-US')} onChange={e=>setNum('whComp',e)} style={{border:'none',outline:'none',background:'transparent',fontFamily:"'IBM Plex Mono',monospace",fontSize:'15px',fontWeight:'600',color:'var(--ink)',width:'100%',minWidth:0}} />
          </div>
          <div style={{marginTop:'18px',background:'var(--accSoft)',borderRadius:'11px',padding:'16px'}}>
            <div style={{fontSize:'12px',color:'var(--accInk)',fontWeight:'600'}}>Tax to withhold each month</div>
            <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'24px',fontWeight:'600',color:'var(--accInk)',marginTop:'5px'}}>{money(whTax)}</div>
            <div style={{fontSize:'12.5px',color:'var(--accInk)',opacity:'.8',marginTop:'3px'}}>Effective rate {whRate.toFixed(1)}%</div>
          </div>
        </div>
        <div style={{border:'1px solid var(--line)',borderRadius:'14px',background:'var(--sf)',padding:'22px'}}>
          <h3 style={{fontSize:'16px',fontWeight:'700',letterSpacing:'-.01em'}}>Year-to-date projector</h3>
          <p style={{fontSize:'13.5px',color:'var(--mut)',marginTop:'3px'}}>Where your annual income and 8% tax are heading.</p>
          <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:'12px',marginTop:'18px'}}>
            <div>
              <label style={{fontSize:'12px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.05em',color:'var(--mut)'}}>Gross so far</label>
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'8px',border:'1.5px solid var(--line)',borderRadius:'10px',padding:'9px 13px',background:'#fbfdff'}}>
                <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'15px',color:'var(--mut)'}}>₱</span>
                <input type="text" inputMode="numeric" value={ytdGross.toLocaleString('en-US')} onChange={e=>setNum('ytdGross',e)} style={{border:'none',outline:'none',background:'transparent',fontFamily:"'IBM Plex Mono',monospace",fontSize:'15px',fontWeight:'600',color:'var(--ink)',width:'100%',minWidth:0}} />
              </div>
            </div>
            <div>
              <label style={{fontSize:'12px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.05em',color:'var(--mut)'}}>Months in</label>
              <div style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'8px',border:'1.5px solid var(--line)',borderRadius:'10px',padding:'9px 13px',background:'#fbfdff'}}>
                <input type="text" inputMode="numeric" value={String(ytdMonths)} onChange={e=>setNum('ytdMonths',e)} style={{border:'none',outline:'none',background:'transparent',fontFamily:"'IBM Plex Mono',monospace",fontSize:'15px',fontWeight:'600',color:'var(--ink)',width:'100%',minWidth:0}} />
              </div>
            </div>
          </div>
          <div style={{marginTop:'18px',display:'flex',flexDirection:'column',gap:'9px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:'13.5px',color:'var(--mut)'}}>Projected annual income</span>
              <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'14px',fontWeight:'600',color:'var(--ink)'}}>{money(projAnnual)}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:'13.5px',color:'var(--mut)'}}>Estimated 8% tax</span>
              <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'14px',fontWeight:'600',color:'var(--ink)'}}>{money(proj8)}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',borderTop:'1px solid var(--line2)',paddingTop:'9px'}}>
              <span style={{fontSize:'13.5px',fontWeight:'600',color:'var(--ink)'}}>Set aside / month</span>
              <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'16px',fontWeight:'600',color:'var(--accInk)'}}>{money(perMonth)}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

  return (
    <div style={{maxWidth:'680px',margin:'0 auto',padding:'30px 28px 72px'}}>
      <button onClick={() => setState(s=>({...s,blogPost:null}))} style={{border:'none',background:'transparent',fontFamily:'inherit',fontSize:'13.5px',fontWeight:'600',color:'var(--mut)',cursor:'pointer',padding:0,marginBottom:'24px'}}>← All articles</button>
      <div style={{fontSize:'11.5px',fontWeight:'700',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--acc)'}}>{p.cat}</div>
      <h1 style={{fontSize:'32px',fontWeight:'800',letterSpacing:'-.03em',lineHeight:'1.1',marginTop:'12px'}}>{p.title}</h1>
      <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:'12.5px',color:'var(--mut)',marginTop:'14px',paddingBottom:'24px',borderBottom:'1px solid var(--line)'}}>{p.read} · {p.date}</div>
      <div style={{marginTop:'8px'}}>
        {(p.body||[]).map((b,i) => (
          <div key={i}>
            {b.kind==='p' && <p style={{fontSize:'17px',lineHeight:'1.7',color:'#34465a',marginTop:'20px'}}>{b.text}</p>}
            {b.kind==='h' && <h2 style={{fontSize:'20px',fontWeight:'700',letterSpacing:'-.015em',color:'var(--ink)',marginTop:'32px'}}>{b.text}</h2>}
            {b.kind==='quote' && <blockquote style={{marginTop:'24px',padding:'4px 0 4px 22px',borderLeft:'3px solid var(--acc)',fontSize:'19px',lineHeight:'1.5',fontWeight:'500',color:'var(--brand)'}}>{b.text}</blockquote>}
            {b.kind==='list' && (
              <div style={{marginTop:'18px',display:'flex',flexDirection:'column',gap:'11px'}}>
                {b.items.map((t,j) => (
                  <div key={j} style={{display:'flex',gap:'13px',alignItems:'baseline'}}>
                    <span style={{width:'6px',height:'6px',borderRadius:'50%',background:'var(--acc)',flexShrink:0,marginTop:'8px',display:'block'}}></span>
                    <span style={{fontSize:'16.5px',lineHeight:'1.6',color:'#34465a'}}>{t}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── App root ───────────────────────────────────────────────────────────────
function App() {
  const [state, setState] = useState({
    type:'se', regime:'8pct', view:'feed', page:'calendar',
    gross:480000, expenses:180000, cwt:0,
    formQuery:'', formCat:'all', openForm:'1701Q',
    penDue:50000, penDays:60, penEopt:true,
    whComp:50000, ytdGross:240000, ytdMonths:6,
    blogPost:null,
  });

  const { page } = state;

  const pages = [
    ['calendar','Calendar'],
    ['calculator','Calculator'],
    ['forms','Forms'],
    ['tools','Tools'],
    ['blog','Blog'],
  ];

  return (
    <div style={{minHeight:'100vh',background:'var(--bg)',color:'var(--ink)',fontSize:'14px'}}>
      {/* header */}
      <header style={{position:'sticky',top:0,zIndex:50,display:'flex',alignItems:'center',justifyContent:'space-between',gap:'12px',flexWrap:'nowrap',padding:'14px 28px',background:'rgba(255,255,255,.86)',backdropFilter:'blur(10px)',borderBottom:'1px solid var(--line)'}}>
        <div style={{display:'flex',alignItems:'center',gap:'16px',flex:'1 1 auto',minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:'11px',flexShrink:0}}>
            <div style={{width:'30px',height:'30px',borderRadius:'50%',background:'var(--brand)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'700',fontSize:'15px'}}>₱</div>
            <span style={{fontWeight:'700',fontSize:'16.5px',letterSpacing:'-.02em',color:'var(--ink)',whiteSpace:'nowrap'}}>Present Value</span>
          </div>
          <nav style={{display:'flex',gap:'2px',flex:'0 1 auto',overflowX:'auto',minWidth:0}}>
            {pages.map(([k,l]) => (
              <button key={k} style={navStyle(page===k)} onClick={() => setState(s=>({...s,page:k}))}>{l}</button>
            ))}
          </nav>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'14px',flexShrink:0}}>
          <div style={{width:'32px',height:'32px',borderRadius:'50%',background:'var(--accSoft)',color:'var(--accInk)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:'700',fontSize:'13px'}}>M</div>
        </div>
      </header>

      {/* pages */}
      {page==='calendar'   && <CalendarPage   state={state} setState={setState} />}
      {page==='calculator' && <CalculatorPage state={state} setState={setState} />}
      {page==='forms'      && <FormsPage      state={state} setState={setState} />}
      {page==='tools'      && <ToolsPage      state={state} setState={setState} />}
      {page==='blog'       && <BlogPage       state={state} setState={setState} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
